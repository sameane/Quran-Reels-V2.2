<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خلفية رمضان متحركة</title>
    <style>
        /* Base Reset & Layout */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: linear-gradient(180deg, #020111 0%, #06112a 35%, #0f2441 70%, #1a365d 100%);
            font-family: sans-serif;
            position: relative;
        }

        /* Twinkling Stars Container */
        #stars-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background-color: #ffffff;
            border-radius: 50%;
            opacity: 0;
            animation: twinkle infinite ease-in-out alternate;
        }

        @keyframes twinkle {
            0% { 
                opacity: 0.1; 
                transform: scale(0.8);
                box-shadow: none;
            }
            100% { 
                opacity: 0.9; 
                transform: scale(1.2);
                box-shadow: 0 0 8px rgba(255, 255, 255, 0.8);
            }
        }

        /* Glowing Moon Container */
        .moon-container {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            pointer-events: none;
        }

        /* استبدال الهلال القديم بالصورة الجديدة */
        .moon {
            width: 50vmin; /* تكبير الحجم قليلاً ليناسب تفاصيل الصورة */
            height: auto;
            /* إضافة توهج خلف الصورة لتبدو مضيئة */
            filter: drop-shadow(0px 0px 30px rgba(255, 215, 0, 0.6));
            /* تعديل الزاوية إذا لزم الأمر */
            transform: rotate(-10deg);
        }

        /* Swaying Ramadan Lantern */
        .lantern-container {
            position: absolute;
            top: 0;
            right: 15%;
            display: flex;
            flex-direction: column;
            align-items: center;
            transform-origin: top center;
            animation: sway 4.5s ease-in-out infinite alternate;
            z-index: 3;
            pointer-events: none;
        }

        .chain {
            width: 3px;
            height: 18vh;
            background: repeating-linear-gradient(to bottom, #d4af37, #d4af37 6px, transparent 6px, transparent 10px);
            filter: drop-shadow(0 0 5px rgba(212, 175, 55, 0.6));
        }

        .lantern-svg {
            width: 12vmin;
            min-width: 60px;
            height: auto;
            margin-top: -5px; 
            filter: drop-shadow(0 0 20px rgba(253, 224, 71, 0.7));
        }

        @keyframes sway {
            0% { transform: rotate(8deg); }
            100% { transform: rotate(-8deg); }
        }

        @media (max-width: 600px) {
            .lantern-container {
                right: 10%;
            }
            .chain {
                height: 12vh;
            }
            .moon {
                width: 65vmin;
            }
        }
    </style>
</head>
<body>

    <!-- Dynamic Stars Container -->
    <div id="stars-container"></div>

    <!-- Center Glowing Moon Image -->
    <div class="moon-container">
        <!-- تأكد من تسمية الصورة moon.png ووضعها بجانب الملف -->
        <img src="crescent moon.png" class="moon" alt="هلال رمضان">
    </div>

    <!-- Swaying Lantern -->
    <div class="lantern-container">
        <div class="chain"></div>
        <svg viewBox="0 0 100 160" class="lantern-svg" preserveAspectRatio="xMidYMid meet">
            <defs>
                <linearGradient id="gold-grad" x1="0" y1="0" x2="1" y2="0">
                    <stop offset="0%" stop-color="#b8860b"/>
                    <stop offset="50%" stop-color="#ffe066"/>
                    <stop offset="100%" stop-color="#b8860b"/>
                </linearGradient>
                <radialGradient id="glass-glow" cx="50%" cy="50%" r="50%">
                    <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
                    <stop offset="35%" stop-color="#fde047" stop-opacity="0.9"/>
                    <stop offset="80%" stop-color="#ca8a04" stop-opacity="0.6"/>
                    <stop offset="100%" stop-color="#ca8a04" stop-opacity="0"/>
                </radialGradient>
            </defs>
            <circle cx="50" cy="15" r="10" stroke="url(#gold-grad)" stroke-width="4" fill="none"/>
            <rect x="45" y="24" width="10" height="6" fill="url(#gold-grad)"/>
            <path d="M 50 30 L 20 60 L 80 60 Z" fill="url(#gold-grad)"/>
            <path d="M 20 60 L 80 60 L 75 65 L 25 65 Z" fill="url(#gold-grad)"/>
            <path d="M 27 65 L 73 65 L 63 115 L 37 115 Z" fill="url(#glass-glow)"/>
            <line x1="42" y1="65" x2="45" y2="115" stroke="url(#gold-grad)" stroke-width="2.5"/>
            <line x1="58" y1="65" x2="55" y2="115" stroke="url(#gold-grad)" stroke-width="2.5"/>
            <line x1="50" y1="65" x2="50" y2="115" stroke="url(#gold-grad)" stroke-width="3"/>
            <path d="M 27 80 L 71 80" stroke="url(#gold-grad)" stroke-width="1.5" opacity="0.6"/>
            <path d="M 32 100 L 68 100" stroke="url(#gold-grad)" stroke-width="1.5" opacity="0.6"/>
            <path d="M 37 115 L 63 115 L 68 125 L 32 125 Z" fill="url(#gold-grad)"/>
            <path d="M 32 125 L 68 125 L 72 132 L 28 132 Z" fill="url(#gold-grad)"/>
            <path d="M 40 132 L 60 132 L 50 142 Z" fill="url(#gold-grad)"/>
            <path d="M 45 142 L 40 155 M 50 142 L 50 160 M 55 142 L 60 155" stroke="url(#gold-grad)" stroke-width="2" fill="none" stroke-linecap="round"/>
        </svg>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const starsContainer = document.getElementById('stars-container');
            const totalStars = 200;

            for (let i = 0; i < totalStars; i++) {
                const star = document.createElement('div');
                star.classList.add('star');
                const size = Math.random() * 2 + 0.5;
                const posX = Math.random() * 100;
                const posY = Math.random() * 100;
                const animDuration = Math.random() * 4 + 2;
                const animDelay = Math.random() * 5;

                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                star.style.left = `${posX}%`;
                star.style.top = `${posY}%`;
                star.style.animationDuration = `${animDuration}s`;
                star.style.animationDelay = `${animDelay}s`;

                starsContainer.appendChild(star);
            }
        });
    </script>
</body>
</html>
